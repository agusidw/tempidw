<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — IDEOWORKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#cd201f;
    --blue:#055eaa;
    --grey:#4c4c4e;
    --ink:#161616;
    --paper:#ffffff;
    --paper-soft:#f6f6f5;
    --line:#e7e7e5;
    --radius:18px;
    --ease:cubic-bezier(.22,.9,.3,1);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{
    font-family:'Space Grotesk',sans-serif;
    letter-spacing:-0.02em;
    margin:0;
  }
  p{margin:0;}
  a{color:inherit;text-decoration:none;}
  ul{margin:0;padding:0;list-style:none;}
  button{font-family:inherit;cursor:pointer;}

  .lang-id, .lang-en{ }
  body.show-en .lang-id{display:none;}
  body.show-id .lang-en{display:none;}

  .wrap{max-width:1180px;margin:0 auto;padding:0 32px;}
  @media (max-width:720px){ .wrap{padding:0 20px;} }

  /* ---------- NAV ---------- */
  .nav{
    position:sticky; top:0; z-index:50;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    height:72px;
  }
  .logo{
    font-size:19px; font-weight:700; letter-spacing:-0.01em;
    display:flex; align-items:center; gap:8px;
  }
  .logo .dot-pair{display:inline-flex; gap:3px;}
  .logo .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .logo .dot.r{background:var(--red);}
  .logo .dot.b{background:var(--blue);}
  .nav-links{display:flex; gap:34px; font-size:14.5px; color:var(--grey);}
  .nav-links a{transition:color .2s var(--ease);}
  .nav-links a:hover{color:var(--ink);}
  .nav-right{display:flex; align-items:center; gap:18px;}
  .lang-toggle{
    display:flex; border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px;
    font-size:12.5px; font-weight:600;
  }
  .lang-toggle button{
    border:none; background:transparent; padding:6px 13px; border-radius:999px;
    color:var(--grey); transition:all .25s var(--ease);
  }
  .lang-toggle button.active{background:var(--ink); color:#fff;}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 22px; border-radius:999px; font-size:14.5px; font-weight:600;
    border:1px solid transparent; transition:transform .25s var(--ease), box-shadow .25s var(--ease), background .25s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--ink); color:#fff;}
  .btn-primary:hover{box-shadow:0 8px 24px rgba(0,0,0,.18); transform:translateY(-1px);}
  .btn-outline{border-color:var(--line); color:var(--ink); background:#fff;}
  .btn-outline:hover{border-color:var(--ink);}
  .btn-blue{background:var(--blue); color:#fff;}
  .btn-blue:hover{box-shadow:0 8px 24px rgba(5,94,170,.35); transform:translateY(-1px);}
  .nav-cta{display:none;}
  @media (min-width:860px){ .nav-cta{display:inline-flex;} }
  .burger{display:none; background:none; border:none; padding:8px;}
  @media (max-width:859px){
    .nav-links{display:none;}
    .burger{display:block;}
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:88px 0 100px;
    overflow:hidden;
  }
  .hero::before{
    content:'';
    position:absolute; top:-220px; right:-220px;
    width:560px; height:560px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(5,94,170,.10), rgba(5,94,170,0) 70%);
    z-index:0;
  }
  .hero::after{
    content:'';
    position:absolute; bottom:-260px; left:-180px;
    width:480px; height:480px; border-radius:50%;
    background:radial-gradient(circle at 60% 40%, rgba(205,32,31,.08), rgba(205,32,31,0) 70%);
    z-index:0;
  }
  .hero-grid{
    position:relative; z-index:1;
    display:grid; grid-template-columns:1.1fr .9fr; gap:64px; align-items:center;
  }
  @media (max-width:940px){ .hero-grid{grid-template-columns:1fr;} }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--blue); margin-bottom:20px;
  }
  .eyebrow .bar{width:22px; height:2px; background:var(--red); display:inline-block;}
  h1.headline{
    font-size:clamp(34px, 5.4vw, 60px);
    line-height:1.04; font-weight:700;
    margin-bottom:22px;
  }
  .sub{
    font-size:18px; line-height:1.6; color:var(--grey); max-width:480px; margin-bottom:34px;
  }
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:36px;}
  .chips{display:flex; gap:10px; flex-wrap:wrap;}
  .chip{
    font-size:13px; font-weight:600; color:var(--ink);
    border:1px solid var(--line); padding:8px 16px; border-radius:999px;
    background:#fff; transition:all .2s var(--ease);
  }
  .chip:hover{border-color:var(--blue); color:var(--blue);}

  /* phone mock */
  .phone-mock{
    position:relative; margin-left:auto; width:100%; max-width:360px;
  }
  .phone-frame{
    background:linear-gradient(160deg,#1c1c1e,#000);
    border-radius:34px; padding:14px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.06);
  }
  .phone-screen{
    background:var(--paper-soft);
    border-radius:22px; padding:20px 16px 24px;
    min-height:420px; display:flex; flex-direction:column; gap:10px;
  }
  .phone-header{
    display:flex; align-items:center; gap:10px; padding-bottom:14px; margin-bottom:6px;
    border-bottom:1px solid var(--line);
  }
  .avatar{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--red));
    flex-shrink:0;
  }
  .phone-header .who{font-size:13.5px; font-weight:600;}
  .phone-header .status{font-size:11.5px; color:#2fae5a; display:flex; align-items:center; gap:5px;}
  .status .pulse{width:7px;height:7px;border-radius:50%;background:#2fae5a; box-shadow:0 0 0 rgba(47,174,90,.5); animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(47,174,90,.45);}
    70%{box-shadow:0 0 0 8px rgba(47,174,90,0);}
    100%{box-shadow:0 0 0 0 rgba(47,174,90,0);}
  }
  .bubble{
    max-width:82%; padding:11px 15px; border-radius:16px; font-size:13.5px; line-height:1.45;
    opacity:0; transform:translateY(8px);
    animation:rise .5s var(--ease) forwards;
  }
  .bubble.in{background:#fff; border:1px solid var(--line); align-self:flex-start; border-bottom-left-radius:4px;}
  .bubble.out{background:var(--blue); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .bubble:nth-child(2){animation-delay:.15s;}
  .bubble:nth-child(3){animation-delay:.5s;}
  .bubble:nth-child(4){animation-delay:.9s;}
  @keyframes rise{ to{opacity:1; transform:translateY(0);} }
  .typing-row{display:flex; gap:4px; align-self:flex-start; padding:11px 15px;}
  .typing-row span{width:6px;height:6px;border-radius:50%;background:#b9b9b9; animation:blink 1.2s infinite;}
  .typing-row span:nth-child(2){animation-delay:.2s;}
  .typing-row span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{ 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }

  /* ---------- SECTION SHELL ---------- */
  section{padding:96px 0;}
  .section-head{max-width:640px; margin-bottom:52px;}
  .section-head .eyebrow{margin-bottom:14px;}
  h2.section-title{font-size:clamp(28px,3.6vw,40px); font-weight:700; line-height:1.1; margin-bottom:14px;}
  .section-sub{font-size:16.5px; color:var(--grey); line-height:1.6;}
  .band-soft{background:var(--paper-soft);}

  /* reveal on scroll */
  .reveal{opacity:0; transform:translateY(22px); transition:opacity .7s var(--ease), transform .7s var(--ease);}
  .reveal.visible{opacity:1; transform:translateY(0);}

  /* ---------- ROUTE GRID ---------- */
  .route-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:20px;
  }
  @media (max-width:900px){ .route-grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:600px){ .route-grid{grid-template-columns:1fr;} }
  .route-card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:28px 26px; transition:transform .3s var(--ease), box-shadow .3s var(--ease), border-color .3s;
    position:relative; overflow:hidden;
  }
  .route-card:hover{
    transform:translateY(-4px);
    box-shadow:0 20px 40px -18px rgba(0,0,0,.16);
    border-color:transparent;
  }
  .route-card .icon{
    width:44px;height:44px;border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:18px;
  }
  .route-card:nth-child(3n+1) .icon{background:rgba(5,94,170,.1);}
  .route-card:nth-child(3n+2) .icon{background:rgba(205,32,31,.1);}
  .route-card:nth-child(3n) .icon{background:rgba(76,76,78,.1);}
  .route-card h3{font-size:17.5px; font-weight:600; margin-bottom:8px;}
  .route-card p{font-size:14.5px; color:var(--grey); line-height:1.55; margin-bottom:16px;}
  .route-card .go{font-size:13.5px; font-weight:600; color:var(--blue); display:inline-flex; gap:6px; align-items:center;}
  .route-card .go svg{transition:transform .25s var(--ease);}
  .route-card:hover .go svg{transform:translateX(4px);}

  /* ---------- CHANNELS ---------- */
  .channel-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
  @media (max-width:900px){ .channel-grid{grid-template-columns:1fr;} }
  .channel-card{
    background:#fff; border-radius:var(--radius); padding:34px 28px;
    border:1px solid var(--line); display:flex; flex-direction:column; height:100%;
  }
  .channel-card .icon-lg{
    width:52px; height:52px; border-radius:14px; margin-bottom:22px;
    display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .channel-card:nth-child(1) .icon-lg{background:#2fae5a;}
  .channel-card:nth-child(2) .icon-lg{background:var(--blue);}
  .channel-card:nth-child(3) .icon-lg{background:var(--red);}
  .channel-card h3{font-size:19px; font-weight:600; margin-bottom:10px;}
  .channel-card p{font-size:15px; color:var(--grey); line-height:1.6; margin-bottom:24px; flex-grow:1;}

  /* ---------- REACH US ---------- */
  .reach-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:start;
  }
  @media (max-width:900px){ .reach-grid{grid-template-columns:1fr;} }
  .reach-list{display:flex; flex-direction:column; gap:26px;}
  .reach-item{display:flex; gap:16px;}
  .reach-item .ic{
    width:40px;height:40px;border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper-soft); color:var(--ink);
  }
  .reach-item h4{font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--grey); margin-bottom:4px;}
  .reach-item p{font-size:16px; line-height:1.5;}
  .reach-item a.act{font-size:13.5px; font-weight:600; color:var(--blue); margin-top:6px; display:inline-block;}
  .map-frame{
    border-radius:var(--radius); overflow:hidden; border:1px solid var(--line);
    min-height:340px; height:100%;
  }
  .map-frame iframe{width:100%; height:100%; min-height:340px; border:0; display:block;}

  /* ---------- FORM ---------- */
  .form-wrap{
    display:grid; grid-template-columns:.85fr 1.15fr; gap:60px;
  }
  @media (max-width:940px){ .form-wrap{grid-template-columns:1fr;} }
  .form-side h2{margin-bottom:16px;}
  .form-side p{color:var(--grey); font-size:16px; line-height:1.6; margin-bottom:26px;}
  .form-note{
    display:flex; gap:12px; align-items:flex-start; background:var(--paper-soft);
    border-radius:14px; padding:16px 18px; font-size:13.5px; color:var(--grey); line-height:1.55;
  }
  .form-note svg{flex-shrink:0; margin-top:2px;}

  .card-form{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:36px; box-shadow:0 30px 60px -34px rgba(0,0,0,.14);
  }
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;}
  @media (max-width:520px){ .field-row{grid-template-columns:1fr;} }
  .field{display:flex; flex-direction:column; gap:7px; margin-bottom:16px;}
  .field label{font-size:13px; font-weight:600; color:var(--grey);}
  .field input, .field select, .field textarea{
    border:1px solid var(--line); border-radius:10px; padding:12px 14px;
    font-family:inherit; font-size:14.5px; color:var(--ink); background:var(--paper-soft);
    transition:border-color .2s, background .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--blue); background:#fff;
  }
  .field textarea{resize:vertical; min-height:96px;}
  .checks{display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; margin-top:6px;}
  @media (max-width:520px){ .checks{grid-template-columns:1fr;} }
  .check-item{
    display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--ink);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; cursor:pointer;
    transition:border-color .2s, background .2s;
  }
  .check-item:has(input:checked){border-color:var(--blue); background:rgba(5,94,170,.06);}
  .check-item input{accent-color:var(--blue);}
  .submit-row{display:flex; align-items:center; justify-content:space-between; margin-top:22px; gap:16px; flex-wrap:wrap;}
  .submit-row .fine{font-size:12.5px; color:var(--grey);}

  /* ---------- MORE TOPICS ---------- */
  .topics-row{
    display:flex; flex-wrap:wrap; gap:14px;
  }
  .topic-pill{
    display:flex; align-items:center; gap:9px;
    border:1px solid var(--line); border-radius:999px; padding:12px 20px;
    font-size:14.5px; font-weight:500; transition:all .2s var(--ease); background:#fff;
  }
  .topic-pill:hover{border-color:var(--ink); background:var(--ink); color:#fff;}

  /* ---------- CLOSING CTA ---------- */
  .cta-band{
    position:relative; border-radius:28px; overflow:hidden;
    background:var(--ink); color:#fff; padding:76px 56px; text-align:center;
    isolation:isolate;
  }
  .cta-band::before{
    content:''; position:absolute; inset:0; z-index:-1;
    background:
      linear-gradient(120deg, var(--blue) 0%, var(--blue) 42%, transparent 42%),
      linear-gradient(120deg, transparent 58%, var(--red) 58%, var(--red) 100%);
    opacity:.9;
  }
  .cta-band::after{
    content:''; position:absolute; inset:0; z-index:-1; background:rgba(10,10,10,.62);
  }
  @media (max-width:640px){ .cta-band{padding:56px 26px;} }
  .cta-band .eyebrow{color:#fff; opacity:.85;}
  .cta-band .eyebrow .bar{background:#fff;}
  .cta-band h2{font-size:clamp(28px,4.4vw,44px); margin-bottom:16px; color:#fff;}
  .cta-band p{font-size:17px; color:rgba(255,255,255,.82); max-width:560px; margin:0 auto 32px;}
  .cta-band .hero-ctas{justify-content:center;}
  .cta-band .btn-outline{background:transparent; border-color:rgba(255,255,255,.35); color:#fff;}
  .cta-band .btn-outline:hover{border-color:#fff;}

  /* ---------- FOOTER ---------- */
  footer{border-top:1px solid var(--line); padding:44px 0; }
  .footer-row{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;}
  .footer-row .fine{font-size:13px; color:var(--grey);}
  .footer-links{display:flex; gap:22px; font-size:13px; color:var(--grey);}
  .footer-links a:hover{color:var(--ink);}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body class="show-id">
tes

</body>
</html>
